<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>老師查詢系統</title>
    <style>
      body {
        font-family: "標楷體", sans-serif;
        max-width: 760px;
        margin: 32px auto;
        padding: 0 16px;
        background: #fcfbf7;
      }

      h1 {
        color: #1f3f2e;
      }

      form {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      input[type="text"] {
        flex: 1 1 280px;
        padding: 10px 12px;
        border: 1px solid #b9b2a6;
        border-radius: 8px;
        font-size: 16px;
      }

      button {
        padding: 10px 16px;
        border: 0;
        border-radius: 8px;
        background: #36563d;
        color: #fff;
        cursor: pointer;
      }

      .back {
        display: inline-block;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h1>老師查詢系統</h1>
    <p>請輸入老師姓名關鍵字（例如：楊、陳、王）。</p>

    <form action="/search" method="post">
      <input type="text" name="teacher_keyword" required />
      <button type="submit">開始查詢</button>
    </form>

    <a class="back" href="/">回到首頁</a>
  </body>
</html>
